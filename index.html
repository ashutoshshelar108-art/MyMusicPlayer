<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Auralia</title>
    <link
        rel="stylesheet"
        href="style.css">
</head>
<body>
    <main class="player">
        <!-- Album Cover -->
        <img
            src=" {
           src="assets/image/cover1.jpg"
            alt="assets/image/cover0.jpg"
            class="cover"
            id="cover">
        <!-- Song Information -->
        <section class="song-info">
            <h2 id="title">
                Song Title
            </h2>
            <p id="artist">
                Artist Name
            </p>
        </section>
        <!-- Audio -->
        <audio
            id="audio">
            <source
                src="assets/songs/song1.mp3"
                type="audio/mpeg">
        </audio>
        <!-- Progress -->
        <section class="progress-container">
            <span id="current-time">
                0:00
            </span>
            <input
                type="range"
                id="progress"
                value="0"
                min="0"
                max="100">
                           <span id="duration">
                0:00
            </span>
        </section>
        <!-- Controls -->
        <section class="controls">
          <button id="shuffle">
    <i data-lucide="shuffle"></i>
</button>

<button id="prev">
    <i data-lucide="skip-back"></i>
</button>

<button id="play">
    <i data-lucide="play"></i>
</button>

<button id="next">
    <i data-lucide="skip-forward"></i>
</button>

<button id="repeat">
    <i data-lucide="repeat"></i>
</button>
        </section>
        <!-- Volume -->
        <section class="volume">
            <label for="volume">
                🔊
            </label>
            <input
                type="range"
                id="volume"
                value="100"
                min="0"
                max="100">
               </section>
               <section class="playlist">
              <h3>Playlist</h3>
              <ul id="playlist">
            </ul>
</section>
    </main>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js"></script>
   <script>
             lucide.createIcons();
  </script>
    
</body>
</html>
